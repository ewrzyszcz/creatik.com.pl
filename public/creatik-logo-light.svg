<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 400" width="1920" height="400">
  <!-- Tło ikony -->
  <rect x="50" y="100" width="200" height="200" rx="40" fill="#f55c00" />
  
  <!-- Ikona Code (< >) -->
  <g transform="translate(50, 100) scale(8.33)" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="16 18 22 12 16 6"/>
    <polyline points="8 6 2 12 8 18"/>
  </g>
  
  <!-- Tekst -->
  <text x="300" y="270" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="220" font-weight="800" fill="#111827" letter-spacing="-5">Crea<tspan fill="#f55c00">tik</tspan></text>
</svg>
